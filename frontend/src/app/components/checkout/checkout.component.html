<div class="container mt-5">
  <div class="row">
    <div class="col-md-8 offset-md-2">
      <h2>Checkout</h2>
      <hr>
      <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
        <h4>Shipping Information</h4>
        <div class="mb-3">
          <label for="shippingName" class="form-label">Full Name</label>
          <input type="text" id="shippingName" formControlName="shippingName" class="form-control">
        </div>
        <div class="mb-3">
          <label for="shippingAddress" class="form-label">Address</label>
          <input type="text" id="shippingAddress" formControlName="shippingAddress" class="form-control">
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="shippingCity" class="form-label">City</label>
            <input type="text" id="shippingCity" formControlName="shippingCity" class="form-control">
          </div>
          <div class="col-md-6 mb-3">
            <label for="shippingPostalCode" class="form-label">Postal Code</label>
            <input type="text" id="shippingPostalCode" formControlName="shippingPostalCode" class="form-control">
          </div>
        </div>
        <h4 class="mt-4">Payment Method</h4>
        <div class="mb-3">
          <label for="paymentMethod" class="form-label">Select Payment</label>
          <select id="paymentMethod" formControlName="paymentMethod" class="form-select">
            <option *ngFor="let method of paymentMethods" [value]="method">{{ method | titlecase }}</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-4" [disabled]="checkoutForm.invalid || isSubmitting">
          <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          Place Order
        </button>
      </form>
    </div>
  </div>
</div>
