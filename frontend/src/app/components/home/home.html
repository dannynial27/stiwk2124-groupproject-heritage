<div class="home-container">
  <div class="banner">
    <h1>Welcome to Ameen Qurba</h1>
    <p>Discover the finest products for your lifestyle.</p>
  </div>
  <div class="featured-products">
    <h2>Featured Products</h2>
    <div class="product-grid">
      <div class="product-card" *ngFor="let product of featuredProducts">
        <img [src]="product.imagePath" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p>RM {{ product.price.toFixed(2) }}</p>
        <button (click)="addToCart(product)" [disabled]="!product.stockQuantity" class="add-btn">Add to Cart</button>
      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>
