<div class="home-container">
  <div class="banner">
    <h1>Welcome to Ameen Qurba</h1>
    <p>Discover traditional heritage products for your modern lifestyle.</p>
  </div>
  
  <div class="featured-products">
    <h2>Featured Products</h2>
    
    <div *ngIf="isLoading" class="text-center my-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2">Loading products...</p>
    </div>
    
    <div *ngIf="errorMessage && !isLoading" class="alert alert-danger">
      {{ errorMessage }}
    </div>
    
    <div *ngIf="!isLoading && featuredProducts.length > 0" class="product-grid">
      <div class="product-card" *ngFor="let product of featuredProducts">
        <img [src]="product.imagePath" alt="{{ product.name }}" 
             onerror="this.src='/assets/default-product.png'">
        <h3>{{ product.name }}</h3>
        <p class="product-category">{{ product.category }}</p>
        <p class="product-price">RM {{ product.price.toFixed(2) }}</p>
        <button (click)="addToCart(product)" 
                [disabled]="!product.stockQuantity" 
                class="add-btn">
          Add to Cart
        </button>
      </div>
    </div>
    
    <div *ngIf="!isLoading && featuredProducts.length === 0" class="text-center my-5">
      <p>No featured products available at this time.</p>
    </div>
  </div>
  
  <app-footer></app-footer>
</div>
