<nav class="navbar" [ngClass]="{'admin-navbar': role === 'ADMIN' || role === 'admin', 'user-navbar': role !== 'ADMIN' && role !== 'admin'}">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/">
      <img src="assets/Logo/logo.png" alt="Ameen Qurba" class="brand-logo">
      <span>Ameen Qurba</span>
    </a>
    
    <div class="navbar-nav" [class.open]="mobileMenuOpen">
      <div class="nav-links">
        
        <!-- Customer Links -->
        <ng-container *ngIf="!role || (role.toLowerCase() !== 'admin')">
          <a routerLink="/home" class="nav-link">Home</a>
          <a routerLink="/products" class="nav-link">Products</a>
          <a routerLink="/my-feedback" *ngIf="isAuthenticated" class="nav-link">My Feedback</a>
          <a routerLink="/feedback" *ngIf="isAuthenticated" class="nav-link">Submit Feedback</a>
          <a *ngIf="isAuthenticated" routerLink="/wishlist" class="nav-link wishlist-link">
            <i class="bi bi-heart"></i>
            <span class="badge" *ngIf="wishlistCount > 0">{{wishlistCount}}</span>
          </a>
          <a *ngIf="isAuthenticated" routerLink="/cart" class="nav-link cart-link">
            <i class="bi bi-cart"></i>
            <span class="badge" *ngIf="cartCount > 0">{{cartCount}}</span>
          </a>
          <a routerLink="/my-orders" *ngIf="isAuthenticated" class="nav-link order-link">
            <i class="bi bi-box-seam"></i>
            <span class="badge" *ngIf="orderCount > 0">{{orderCount}}</span>
          </a>
        </ng-container>
        
        <!-- Admin Links -->
        <ng-container *ngIf="role && role.toLowerCase() === 'admin'">
            <a routerLink="/admin-dashboard" class="nav-link">Dashboard</a>
            <div class="nav-dropdown">
              <button class="nav-link dropdown-toggle" (click)="toggleDropdown($event)">
                <i class="bi bi-box-seam"></i> Manage Products <i class="bi bi-chevron-down"></i>
              </button>
              <div class="dropdown-menu">
                <a routerLink="/admin/products" class="dropdown-item">
                  <i class="bi bi-card-list"></i> All Products
                </a>
                <a routerLink="/view-categories" class="dropdown-item">
                  <i class="bi bi-tags"></i> Manage by Categories
                </a>
                <a routerLink="/add-product" class="dropdown-item">
                  <i class="bi bi-plus-circle"></i> Add Product
                </a>
              </div>
            </div>
            <a routerLink="/admin-orders" class="nav-link">Manage Orders</a>
            <a routerLink="/admin-feedback" class="nav-link">View Feedback</a>
        </ng-container>
        
        <!-- Auth Dropdown -->
        <div class="nav-dropdown" #authDropdown>
          <button class="nav-link dropdown-toggle" (click)="toggleDropdown($event)">
            <i class="bi bi-person-circle"></i>
            <i class="bi bi-chevron-down"></i>
          </button>
          <div class="dropdown-menu">
            <a *ngIf="!isAuthenticated" routerLink="/login" class="dropdown-item">
              <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
            <a *ngIf="!isAuthenticated" routerLink="/register" class="dropdown-item">
              <i class="bi bi-person-plus"></i> Register
            </a>
            <button *ngIf="isAuthenticated" (click)="logout()" class="dropdown-item">
              <i class="bi bi-box-arrow-right"></i> Logout
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Mobile menu toggle -->
    <button class="menu-toggle" (click)="toggleMobileMenu()">
      <span class="menu-icon"></span>
    </button>
  </div>
</nav>
