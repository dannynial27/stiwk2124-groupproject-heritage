<main class="register-container">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-7 col-xl-6">
      <div class="text-center mb-4">
        <img src="assets/Logo/logo.png" alt="Ameen Qurba" class="logo mb-2">
        <h2 class="title mb-1">Create Your Account</h2>
        <p class="subtitle">Join us to explore authentic Malaysian heritage products.</p>
      </div>
      
      <div class="card shadow-lg">
        <div class="card-body p-4 p-md-5">
          <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <!-- Username -->
            <div class="form-floating mb-3">
              <input 
                type="text" 
                class="form-control" 
                id="username" 
                placeholder="Username"
                [(ngModel)]="user.username" 
                name="username" 
                required
                [disabled]="isLoading">
              <label for="username">Username</label>
            </div>
            
            <!-- Email -->
            <div class="form-floating mb-3">
              <input 
                type="email" 
                class="form-control" 
                id="email" 
                placeholder="name@example.com"
                [(ngModel)]="user.email" 
                name="email" 
                required
                email
                [disabled]="isLoading"
                #emailInput="ngModel">
              <label for="email">Email address</label>
              <div *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)" class="invalid-feedback">
                <div *ngIf="emailInput.errors?.['required']">Email is required.</div>
                <div *ngIf="emailInput.errors?.['email']">Please enter a valid email address.</div>
              </div>
            </div>
            
            <!-- Password -->
            <div class="form-floating mb-4">
              <input 
                type="password" 
                class="form-control" 
                id="password" 
                placeholder="Password"
                [(ngModel)]="user.password" 
                name="password" 
                required
                minlength="6"
                [disabled]="isLoading"
                #passwordInput="ngModel">
              <label for="password">Password</label>
              <div *ngIf="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)" class="invalid-feedback">
                <div *ngIf="passwordInput.errors?.['required']">Password is required.</div>
                <div *ngIf="passwordInput.errors?.['minlength']">Password must be at least 6 characters long.</div>
              </div>
            </div>
            
            <!-- Role Selection -->
            <div class="mb-4">
              <label class="role-selection-label d-block">Register as:</label>
              <div class="role-options">
                <div class="role-option" [class.selected]="user.role === 'CUSTOMER'">
                  <input 
                    class="form-check-input" 
                    type="radio" 
                    name="role" 
                    id="customerRole" 
                    value="CUSTOMER" 
                    [(ngModel)]="user.role"
                    (change)="onRoleChange()"
                    [disabled]="isLoading">
                  <label class="form-check-label" for="customerRole">
                    <div class="role-icon customer-icon"></div>
                    <span>Customer</span>
                  </label>
                </div>
                <div class="role-option" [class.selected]="user.role === 'ADMIN'">
                  <input 
                    class="form-check-input" 
                    type="radio" 
                    name="role" 
                    id="adminRole" 
                    value="ADMIN" 
                    [(ngModel)]="user.role"
                    (change)="onRoleChange()"
                    [disabled]="isLoading">
                  <label class="form-check-label" for="adminRole">
                    <div class="role-icon admin-icon"></div>
                    <span>Admin</span>
                  </label>
                </div>
              </div>
            </div>
            
            <!-- Error/Success Messages -->
            <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
              <i class="fas fa-times-circle me-2"></i>
              <div>{{ errorMessage }}</div>
            </div>
            <div *ngIf="successMessage" class="alert alert-success" role="alert">
              <i class="fas fa-check-circle me-2"></i>
              <div>{{ successMessage }}</div>
            </div>
            
            <!-- Submit Button -->
            <button 
              type="submit" 
              class="btn btn-primary btn-lg w-100 mb-4 mt-2"
              [disabled]="registerForm.invalid || isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              <span *ngIf="!isLoading">Create Account</span>
            </button>
            
            <!-- Login Link -->
            <p class="text-center mb-0">
              Already have an account? <a routerLink="/login" class="fw-bold">Sign In</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
