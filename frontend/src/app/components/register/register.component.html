<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="text-center mb-4">
        <img src="assets/Logo/logo.png" alt="Ameen Qurba" class="logo mb-3" width="100">
        <h2 class="fw-bold mb-2">Create Your Account</h2>
        <p class="text-muted">Join Ameen Qurba for authentic Malaysian heritage products</p>
      </div>
      
      <div class="card shadow">
        <div class="card-body p-4 p-md-5">
          <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <!-- Username -->
            <div class="form-floating mb-4">
              <input 
                type="text" 
                class="form-control" 
                id="username" 
                placeholder="Username"
                [(ngModel)]="user.username" 
                name="username" 
                required
                [disabled]="isLoading">
              <label for="username">Username</label>
            </div>
            
            <!-- Email -->
            <div class="form-floating mb-4">
              <input 
                type="email" 
                class="form-control" 
                id="email" 
                placeholder="name@example.com"
                [(ngModel)]="user.email" 
                name="email" 
                required
                [disabled]="isLoading">
              <label for="email">Email address</label>
            </div>
            
            <!-- Password -->
            <div class="form-floating mb-4">
              <input 
                type="password" 
                class="form-control" 
                id="password" 
                placeholder="Password"
                [(ngModel)]="user.password" 
                name="password" 
                required
                [disabled]="isLoading">
              <label for="password">Password</label>
              <small class="form-text text-muted">Password must be at least 6 characters long</small>
            </div>
            
            <!-- Role Selection -->
            <div class="mb-4">
              <label class="form-label fw-medium">Register as:</label>
              <div class="role-options">
                <div class="role-option">
                  <input 
                    class="form-check-input" 
                    type="radio" 
                    name="role" 
                    id="customerRole" 
                    value="CUSTOMER" 
                    [(ngModel)]="user.role"
                    [disabled]="isLoading">
                  <label class="form-check-label" for="customerRole">
                    <div class="role-icon customer-icon"></div>
                    <span>Customer</span>
                  </label>
                </div>
                <div class="role-option">
                  <input 
                    class="form-check-input" 
                    type="radio" 
                    name="role" 
                    id="adminRole" 
                    value="ADMIN" 
                    [(ngModel)]="user.role"
                    [disabled]="isLoading">
                  <label class="form-check-label" for="adminRole">
                    <div class="role-icon admin-icon"></div>
                    <span>Admin</span>
                  </label>
                </div>
              </div>
            </div>
            
            <!-- Error/Success Messages -->
            <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
              {{ errorMessage }}
            </div>
            
            <div *ngIf="successMessage" class="alert alert-success" role="alert">
              {{ successMessage }}
            </div>
            
            <!-- Submit Button -->
            <button 
              type="submit" 
              class="btn btn-primary btn-lg w-100 mb-4" 
              [disabled]="registerForm.invalid || isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Register
            </button>
            
            <!-- Login Link -->
            <p class="text-center mb-0">
              Already have an account? <a routerLink="/login" class="text-decoration-none fw-medium">Login</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
