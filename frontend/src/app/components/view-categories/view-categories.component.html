<div class="container category-admin-container">
    <h2 class="category-title">Manage Categories</h2>
    <div class="category-card">
      <div *ngIf="successMessage" class="form-success-message">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="form-error-message">{{ errorMessage }}</div>
      <ul class="list-group category-list">
        <li class="list-group-item d-flex justify-content-between align-items-center category-list-item" *ngFor="let category of categories">
          <span>{{ category }}</span>
          <button (click)="deleteCategory(category)" class="btn btn-danger btn-sm" [disabled]="loading" title="Delete this category">Delete</button>
        </li>
      </ul>
      <div class="add-category-row mt-4">
        <input type="text" [(ngModel)]="newCategory" class="form-control add-category-input" placeholder="Enter new category name..." [disabled]="loading">
        <button (click)="addCategory()" class="btn btn-primary add-category-btn ms-2" [disabled]="!newCategory.trim() || categories.includes(newCategory.trim()) || loading">
          <span *ngIf="loading" class="spinner"></span>
          Add
        </button>
      </div>
    </div>
  </div>
