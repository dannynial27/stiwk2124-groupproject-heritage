<div class="container mt-5">
  <h2>View Categories</h2>
  <div class="card p-4">
    <ul class="list-group">
      <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let category of categories">
        {{ category }}
        <button (click)="deleteCategory(category)" class="btn btn-danger btn-sm">Delete</button>
      </li>
    </ul>
    <div class="mt-3">
      <input type="text" [(ngModel)]="newCategory" class="form-control d-inline-block w-75" placeholder="New Category">
      <button (click)="addCategory()" class="btn btn-primary ms-2">Add</button>
    </div>
  </div>
</div>
