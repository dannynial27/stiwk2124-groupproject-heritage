<div class="container manage-products-container">
  <h2 class="page-title">Manage Products by Category</h2>

  <!-- Category Filters -->
  <div class="category-filters" *ngIf="!loading">
    <button
      *ngFor="let category of categories"
      class="filter-btn"
      [class.active]="category === selectedCategory"
      (click)="filterByCategory(category)">
      {{ category }}
    </button>
  </div>

  <app-loading-spinner *ngIf="loading" message="Loading products..."></app-loading-spinner>

  <div *ngIf="!loading">
    <!-- Products Grid -->
    <div class="products-grid" *ngIf="filteredProducts.length > 0; else noProducts">
      <div class="admin-product-card" *ngFor="let product of filteredProducts">
        <div class="card-image">
          <img [src]="imageService.getProductImageUrl(product.imagePath)" [alt]="product.name" (error)="onImageError($event)">
        </div>
        <div class="card-body">
          <h5 class="product-name">{{ product.name }}</h5>
          <div class="product-details">
            <span class="price">RM {{ product.price.toFixed(2) }}</span>
            <span class="stock" [class.out-of-stock]="product.stockQuantity === 0">
              Stock: {{ product.stockQuantity }}
            </span>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn btn-edit" (click)="editProduct(product.productId)">Edit</button>
          <button class="btn btn-delete" (click)="deleteProduct(product)" [disabled]="deletingIds.has(product.productId)">
            <span *ngIf="!deletingIds.has(product.productId)">Delete</span>
            <span *ngIf="deletingIds.has(product.productId)">...</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <ng-template #noProducts>
      <div class="empty-state">
        <h3>No products found in this category.</h3>
      </div>
    </ng-template>
  </div>
</div>
