<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center">
    <h2>Manage All Orders</h2>
    <div>
      <label for="statusFilter" class="form-label me-2">Filter by Status:</label>
      <select id="statusFilter" class="form-select d-inline-block w-auto" (change)="filterByStatus($event)">
        <option value="">All</option>
        <option *ngFor="let status of statuses" [value]="status">{{ status | titlecase }}</option>
      </select>
    </div>
  </div>
  <hr>
  <div *ngIf="!isLoading; else loading">
    <div *ngIf="orders.length > 0; else noOrders">
      <table class="table table-striped table-hover">
        <thead>
        <tr>
          <th (click)="sortBy('orderId')">
            Order ID <i class="bi sort-icon" [ngClass]="{'bi-arrow-down': sortColumn === 'orderId' && sortDirection === 'desc', 'bi-arrow-up': sortColumn === 'orderId' && sortDirection === 'asc'}"></i>
          </th>
          <th (click)="sortBy('user.userId')">
            Customer ID <i class="bi sort-icon" [ngClass]="{'bi-arrow-down': sortColumn === 'user.userId' && sortDirection === 'desc', 'bi-arrow-up': sortColumn === 'user.userId' && sortDirection === 'asc'}"></i>
          </th>
          <th (click)="sortBy('orderDate')">
            Date <i class="bi sort-icon" [ngClass]="{'bi-arrow-down': sortColumn === 'orderDate' && sortDirection === 'desc', 'bi-arrow-up': sortColumn === 'orderDate' && sortDirection === 'asc'}"></i>
          </th>
          <th (click)="sortBy('totalAmount')">
            Total <i class="bi sort-icon" [ngClass]="{'bi-arrow-down': sortColumn === 'totalAmount' && sortDirection === 'desc', 'bi-arrow-up': sortColumn === 'totalAmount' && sortDirection === 'asc'}"></i>
          </th>
          <th (click)="sortBy('status')">
            Status <i class="bi sort-icon" [ngClass]="{'bi-arrow-down': sortColumn === 'status' && sortDirection === 'desc', 'bi-arrow-up': sortColumn === 'status' && sortDirection === 'asc'}"></i>
          </th>
          <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let order of orders">
          <td>{{ order.orderId }}</td>
          <td>{{ order.user?.userId }}</td>
          <td>{{ order.orderDate | date:'short' }}</td>
          <td>{{ order.totalAmount | currency:'MYR' }}</td>
          <td><span class="badge" [ngClass]="{'bg-warning': order.status === 'PENDING', 'bg-info': order.status === 'CONFIRMED', 'bg-primary': order.status === 'SHIPPED', 'bg-success': order.status === 'DELIVERED', 'bg-danger': order.status === 'CANCELLED'}">{{ order.status | titlecase }}</span></td>
          <td>
            <select class="form-select form-select-sm" (change)="updateStatus(order, $event)">
              <option [selected]="true" disabled>Change Status</option>
              <option *ngFor="let status of statuses" [value]="status">{{ status | titlecase }}</option>
            </select>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
    <ng-template #noOrders>
      <div class="alert alert-info">No orders found.</div>
    </ng-template>
  </div>
  <ng-template #loading>
    <p>Loading all orders...</p>
  </ng-template>
</div>
