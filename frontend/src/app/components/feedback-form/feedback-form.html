<div class="feedback-form-container">
  <div class="feedback-header">
    <h3>Share Your Thoughts</h3>
    <p>We'd love to hear from you!</p>
  </div>
  <form *ngIf="isAuthenticated" (ngSubmit)="submitFeedback()" #feedbackForm="ngForm" class="feedback-form">
    <div class="form-group">
      <label for="subject" class="form-label">Subject</label>
      <input type="text" id="subject" [(ngModel)]="feedback.subject" name="subject" required placeholder="e.g., Product Quality Issue" class="form-control">
    </div>
    <div class="form-group">
      <label for="content" class="form-label">Your Message</label>
      <textarea id="content" [(ngModel)]="feedback.content" name="content" required rows="5" placeholder="Please provide details here..." class="form-control"></textarea>
    </div>
    <button type="submit" class="submit-btn" [disabled]="feedbackForm.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      <span *ngIf="!isLoading">Send Feedback</span>
      <span *ngIf="isLoading">Submitting...</span>
    </button>
    <div *ngIf="successMessage" class="feedback-message success">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="feedback-message error">
      {{ errorMessage }}
    </div>
  </form>
  <div *ngIf="!isAuthenticated" class="login-prompt">
    <p>Your feedback is valuable. Please <a routerLink="/login">log in</a> to share your thoughts.</p>
  </div>
</div>
