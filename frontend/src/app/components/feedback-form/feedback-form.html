<div class="feedback-form-container">
  <form (ngSubmit)="submitFeedback()" class="feedback-form">
    <div>
      <label for="name">Name:</label>
      <input type="text" id="name" [(ngModel)]="feedback.name" name="name" required>
    </div>
    <div>
      <label for="email">Email:</label>
      <input type="email" id="email" [(ngModel)]="feedback.email" name="email" required>
    </div>
    <div>
      <label for="message">Message:</label>
      <textarea id="message" [(ngModel)]="feedback.message" name="message" required></textarea>
    </div>
    <button type="submit">Submit</button>
    <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
  </form>
</div>
