<div class="container mt-5">
  <h2>Admin Login</h2>
  <div class="card p-4" style="max-width: 400px; margin: auto;">
    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" [(ngModel)]="username" name="username" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" [(ngModel)]="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
      <div *ngIf="errorMessage" class="alert alert-danger mt-3" role="alert">
        {{ errorMessage }}
      </div>
      <p class="mt-3 text-center">
        User? <a routerLink="/login">Login as User</a>
      </p>
    </form>
  </div>
</div>
