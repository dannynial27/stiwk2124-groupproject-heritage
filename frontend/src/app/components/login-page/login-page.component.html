<div class="container mt-5">
  <h2 class="text-center mb-4">Welcome to Ameen Qurba</h2>
  <div class="card p-4 shadow" style="max-width: 450px; margin: auto;">
    <h3 class="text-center mb-4">Login</h3>
    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input 
          type="text" 
          class="form-control" 
          id="username" 
          [(ngModel)]="username" 
          name="username" 
          required
          [disabled]="isLoading">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input 
          type="password" 
          class="form-control" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          required
          [disabled]="isLoading">
      </div>
      <button 
        type="submit" 
        class="btn btn-primary w-100"
        [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        Login
      </button>
      <div *ngIf="errorMessage" class="alert alert-danger mt-3" role="alert">
        {{ errorMessage }}
      </div>
      <p class="mt-3 text-center">
        Admin? <a routerLink="/admin-login">Login as Admin</a>
      </p>
      <p class="text-center">
        Don't have an account? <a routerLink="/register">Register now</a>
      </p>
    </form>
  </div>
</div>
