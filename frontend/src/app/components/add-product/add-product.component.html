<div class="container mt-5">
  <h2>{{ productId ? 'Edit Product' : 'Add New Product' }}</h2>
  <hr>
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="name" class="form-label">Product Name</label>
      <input type="text" id="name" formControlName="name" class="form-control">
    </div>
    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea id="description" formControlName="description" class="form-control"></textarea>
    </div>
    <div class="mb-3">
      <label for="price" class="form-label">Price (MYR)</label>
      <input type="number" id="price" formControlName="price" class="form-control">
    </div>
    <div class="mb-3">
      <label for="category" class="form-label">Category</label>
      <select id="category" formControlName="category" class="form-control">
        <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="stockQuantity" class="form-label">Stock Quantity</label>
      <input type="number" id="stockQuantity" formControlName="stockQuantity" class="form-control">
    </div>
    <div class="mb-3">
      <label for="imagePath" class="form-label">Image URL</label>
      <input type="text" id="imagePath" formControlName="imagePath" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary w-100" [disabled]="productForm.invalid">Save Product</button>
    <div *ngIf="errorMessage" class="error mt-3">{{ errorMessage }}</div>
  </form>
</div>
