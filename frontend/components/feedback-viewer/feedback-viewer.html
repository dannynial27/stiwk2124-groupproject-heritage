<div class="feedback-viewer-container">
  <h2>Feedback Viewer</h2>
  <div *ngIf="feedbacks.length === 0" class="no-feedback">No feedbacks available.</div>
  <div class="feedback-list" *ngIf="feedbacks.length > 0">
    <div class="feedback-item" *ngFor="let feedback of feedbacks">
      <h3>{{ feedback.name }}</h3>
      <p><strong>Email:</strong> {{ feedback.email }}</p>
      <p><strong>Message:</strong> {{ feedback.message }}</p>
    </div>
  </div>
  <app-footer></app-footer>
</div>
