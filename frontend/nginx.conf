server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # For development - handle API requests without backend dependency
    # This will return a 404 for API requests, which you can modify if needed
    location /api/ {
        # Return 404 or you could add a custom error response
        return 404;
    }
}
